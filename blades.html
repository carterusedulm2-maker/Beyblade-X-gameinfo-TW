<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blade & Combo 分析 ｜ 戰鬥陀螺 X 零件圖鑑</title>
<style>
:root{--bg:#0f172a;--card:#1e293b;--card2:#253748;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--accent:#3b82f6;--accent2:#60a5fa;--green:#4ade80;--red:#f87171;--yellow:#fbbf24;--purple:#a78bfa;--pink:#f472b6;--teal:#2dd4bf}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding:0 0 3rem}
header{background:linear-gradient(135deg,#1e3a5f,#0f172a);padding:1.5rem 1rem 1.2rem;text-align:center;border-bottom:2px solid var(--accent)}
header h1{font-size:1.5rem;margin-bottom:.3rem}
header p{color:var(--muted);font-size:.85rem}

/* nav tabs */
.tabs{max-width:1100px;margin:1rem auto;padding:0 1rem;display:flex;flex-wrap:wrap;gap:.4rem}
.tab-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:.4rem .8rem;border-radius:8px;font-size:.8rem;cursor:pointer;transition:all .2s}
.tab-btn:hover{border-color:var(--accent);color:var(--text)}
.tab-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}

/* filters */
.controls{max-width:1100px;margin:0 auto;padding:.8rem 1rem;display:flex;flex-wrap:wrap;gap:.5rem;align-items:center;background:var(--card);border-radius:10px;border:1px solid var(--border);margin-bottom:.8rem}
.controls select,.controls input{font-size:.82rem;padding:.35rem .6rem;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text)}
.controls label{font-size:.75rem;color:var(--muted);display:flex;align-items:center;gap:.3rem}
.search-box{flex:1;min-width:180px}
.search-box input{width:100%}
.stats-bar{max-width:1100px;margin:.3rem auto;padding:0 1rem;font-size:.78rem;color:var(--muted)}

/* blade grid */
.grid{max-width:1100px;margin:0 auto;padding:0 1rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:.8rem}

/* blade card */
.blade-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem;transition:border-color .2s}
.blade-card:hover{border-color:var(--accent2)}
.blade-card.expanded{border-color:var(--accent);grid-column:1/-1}
.blade-header{display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;margin-bottom:.5rem}
.blade-name{font-size:1.1rem;font-weight:700;color:var(--accent2)}
.blade-weight{font-size:.75rem;color:var(--muted);white-space:nowrap;background:var(--bg);padding:.1rem .4rem;border-radius:4px;border:1px solid var(--border)}
.blade-type{display:inline-block;font-size:.68rem;padding:.1rem .4rem;border-radius:4px;font-weight:600}
.type-attack{background:#3a1a1a;color:var(--red)}
.type-defense{background:#1a3a2a;color:var(--green)}
.type-stamina{background:#1a2a3a;color:#60a5fa}
.type-balance{background:#2a1a3a;color:var(--purple)}
.blade-tags{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.4rem}
.tag{font-size:.68rem;padding:.15rem .4rem;border-radius:4px;background:var(--tag-bg,var(--card2));color:var(--muted)}
.tag-tier-s{background:#3a2a1a;color:var(--yellow)}
.tag-tier-a{background:#1a2a3a;color:#60a5fa}
.tag-tier-b{background:#2a2a2a;color:#94a3b8}
.tag-burst{background:#2a1a2a;color:var(--pink)}

/* expanded detail - always visible */
.blade-detail{display:block;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border)}
.blade-card.expanded .blade-detail{display:block}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:.4rem 1rem;font-size:.85rem;margin-bottom:.8rem}
.detail-grid dt{color:var(--muted)}
.detail-grid dd{color:var(--text)}
.combos-section{margin-top:.8rem}
.combos-title{font-size:.85rem;font-weight:600;color:var(--accent2);margin-bottom:.4rem}
.combo-row{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.5rem;padding:.5rem;background:var(--bg);border-radius:6px;border:1px solid var(--border)}
.combo-part{font-size:.78rem;padding:.2rem .5rem;border-radius:4px;background:var(--card2);color:var(--text)}
.combo-part.blade-part{color:var(--accent2);font-weight:600}
.combo-part.rach{color:var(--green)}
.combo-part.bit{color:var(--yellow)}
.combo-note{font-size:.72rem;color:var(--muted);width:100%;margin-top:.2rem}
.pros-cons{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;font-size:.8rem;margin-top:.6rem}
.pros{background:#1a2a1a;padding:.5rem;border-radius:6px;border:1px solid #2a4a2a}
.cons{background:#2a1a1a;padding:.5rem;border-radius:6px;border:1px solid #4a2a2a}
.pros-title{color:var(--green);font-weight:600;margin-bottom:.3rem;font-size:.75rem}
.cons-title{color:var(--red);font-weight:600;margin-bottom:.3rem;font-size:.75rem}
.pros li,.cons li{margin-left:.8rem}

/* bit/ratchet panels */
.panel{display:none}
.panel.active{display:block}

/* table */
.data-table{max-width:1100px;margin:0 auto;padding:0 1rem}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{background:var(--card);color:var(--accent2);padding:.6rem .8rem;text-align:left;font-weight:600;border-bottom:2px solid var(--border)}
td{padding:.5rem .8rem;border-bottom:1px solid var(--border);color:var(--text)}
tr:hover td{background:var(--card)}
tr:last-child td{border-bottom:none}

/* overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:center;justify-content:center;padding:1rem}
.overlay.open{display:flex}
.overlay-card{background:var(--card);border:1px solid var(--accent);border-radius:14px;padding:1.5rem;max-width:700px;width:100%;max-height:85vh;overflow-y:auto}
.overlay-close{background:var(--accent);border:none;color:#fff;padding:.4rem .8rem;border-radius:6px;cursor:pointer;float:right;margin-bottom:.5rem}
.overlay-close:hover{background:var(--accent2)}

.no-data{text-align:center;color:var(--muted);padding:3rem 1rem}

@media(max-width:600px){
  .grid{grid-template-columns:1fr}
  .detail-grid{grid-template-columns:1fr}
  .pros-cons{grid-template-columns:1fr}
  .overlay-card{max-height:90vh}
}
</style>
</head>
<body>
<header>
  <h1>⚔️ Beyblade X 零件 & Combo 分析</h1>
  <p id="sourceLine">資料載入中...</p>
  <p style="margin-top:.5rem"><a href="index.html" style="color:var(--accent2)">🏆 比賽資訊</a></p>
</header>

<nav class="tabs">
  <button class="tab-btn active" data-tab="blades">🔩 Blade 分析</button>
  <button class="tab-btn" data-tab="ratchets">⚙️ Ratchet 列表</button>
  <button class="tab-btn" data-tab="bits">🎯 Bit 列表</button>
  <button class="tab-btn" data-tab="combos">🏆 Combo 推薦</button>
</nav>

<!-- BLADES PANEL -->
<div class="panel active" id="panel-blades">
  <div class="controls">
    <div class="search-box">
      <label for="searchBlade">🔍 搜尋</label>
      <input type="text" id="searchBlade" placeholder="輸入 Blade 名稱...">
    </div>
    <label><input type="checkbox" id="filterAttack"> 攻擊型</label>
    <label><input type="checkbox" id="filterDefense"> 防禦型</label>
    <label><input type="checkbox" id="filterStamina"> 耐力型</label>
    <label><input type="checkbox" id="filterBalance"> 平衡型</label>
    <span id="bladeCount" style="font-size:.75rem;color:var(--muted);margin-left:auto"></span>
  </div>
  <div class="stats-bar" id="bladeStats">載入中...</div>
  <div class="grid" id="bladeGrid"></div>
</div>

<!-- RATCHETS PANEL -->
<div class="panel" id="panel-ratchets">
  <div class="controls">
    <div class="search-box">
      <label for="searchRach">🔍 搜尋</label>
      <input type="text" id="searchRach" placeholder="輸入編號，如 3-60...">
    </div>
  </div>
  <div class="data-table">
    <table>
      <thead><tr><th>編號</th><th>邊數</th><th>高度</th><th>重量</th><th>類型</th><th>特性</th></tr></thead>
      <tbody id="rachTable"></tbody>
    </table>
  </div>
</div>

<!-- BITS PANEL -->
<div class="panel" id="panel-bits">
  <div class="controls">
    <div class="search-box">
      <label for="searchBit">🔍 搜尋</label>
      <input type="text" id="searchBit" placeholder="輸入 Bit 名稱...">
    </div>
  </div>
  <div class="data-table">
    <table>
      <thead><tr><th>Bit 名</th><th>縮寫</th><th>重量</th><th>Burst 抵抗</th><th>類型</th><th>特性</th></tr></thead>
      <tbody id="bitTable"></tbody>
    </table>
  </div>
</div>

<!-- COMBOS PANEL -->
<div class="panel" id="panel-combos">
  <div class="controls">
    <div class="search-box">
      <label for="searchCombo">🔍 搜尋</label>
      <input type="text" id="searchCombo" placeholder="輸入 combo 關鍵字...">
    </div>
    <label><input type="checkbox" id="filterComboAttack"> 攻擊型</label>
    <label><input type="checkbox" id="filterComboDefense"> 防禦型</label>
    <label><input type="checkbox" id="filterComboStamina"> 耐力型</label>
  </div>
  <div class="grid" id="comboGrid"></div>
</div>

<!-- OVERLAY for full detail -->
<div class="overlay" id="overlay">
  <div class="overlay-card">
    <button class="overlay-close" onclick="closeOverlay()">✕ 關閉</button>
    <div id="overlayContent"></div>
  </div>
</div>

<script>
let BLADES=[];
let RATCHETS=[];
let BITS=[];
let COMBOS=[];
let PART_META={};
let COMBO_META={};

const typeLabel={attack:"攻擊型",defense:"防禦型",stamina:"耐力型",balance:"平衡型"};
const typeClass={attack:"type-attack",defense:"type-defense",stamina:"type-stamina",balance:"type-balance"};
const tierBadge={S:"tag-tier-s","S+":"tag-tier-s",A:"tag-tier-a",B:"tag-tier-b"};
const zhTypeClass={攻擊:"attack",防禦:"defense",耐力:"stamina",平衡:"balance"};

function esc(value){
  return String(value ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

async function loadData(){
  const responses = await Promise.all([fetch("parts.json"), fetch("combos.json")]);
  if(!responses[0].ok) throw new Error("parts.json HTTP " + responses[0].status);
  if(!responses[1].ok) throw new Error("combos.json HTTP " + responses[1].status);
  const parts = await responses[0].json();
  const combos = await responses[1].json();
  PART_META = parts.metadata || {};
  COMBO_META = combos.metadata || {};
  BLADES = parts.blades || [];
  RATCHETS = parts.ratchets || [];
  BITS = parts.bits || [];
  COMBOS = combos.combos || [];
}

function updateMeta(){
  const sourceLine=document.getElementById("sourceLine");
  sourceLine.textContent="資料來源：beybxdb / BeyBase / BBX Weekly ｜ 數據截至 " + (PART_META.dataThrough || "最新") + " ｜ 更新 " + (PART_META.lastUpdated || "");
}

function comboParts(combo){
  const parts = String(combo || "").split("+").map(p=>p.trim());
  return [parts[0] || "—", parts[1] || "—", parts[2] || "—"];
}

function renderBlades(filter="",fAttack=false,fDefense=false,fStamina=false,fBalance=false){
  const grid=document.getElementById("bladeGrid");
  const normalizedFilter=filter.toLowerCase();
  const filtered=BLADES.filter(b=>{
    const text=[b.name,b.note,b.source,b.system,b.tier].join(" ").toLowerCase();
    const matchName=text.includes(normalizedFilter);
    const matchType=(!fAttack&&!fDefense&&!fStamina&&!fBalance)||
      (fAttack&&b.type==="attack")||(fDefense&&b.type==="defense")||
      (fStamina&&b.type==="stamina")||(fBalance&&b.type==="balance");
    return matchName&&matchType;
  });
  document.getElementById("bladeCount").textContent="共 " + filtered.length + " 個 blades";
  document.getElementById("bladeStats").textContent="全部 " + BLADES.length + " 個 Blade 詳細分析 ｜ " + RATCHETS.length + " 個 Ratchet ｜ " + BITS.length + " 個 Bit ｜ " + COMBOS.length + " 組 Combo";
  if(!filtered.length){grid.innerHTML='<div class="no-data">沒有符合條件的 Blade</div>';return;}
  grid.innerHTML=filtered.map(b=>{
    const tags=['<span class="tag '+(tierBadge[b.tier]||'tag-tier-a')+'">Tier '+esc(b.tier)+'</span>'];
    if(b.metaRank) tags.push('<span class="tag">Meta #'+esc(b.metaRank)+'</span>');
    if(b.system) tags.push('<span class="tag">'+esc(b.system)+'</span>');
    if(b.source) tags.push('<span class="tag">'+esc(b.source)+'</span>');
    if(b.note) tags.push('<span class="tag">'+esc(String(b.note).split('，')[0])+'</span>');
    return '<div class="blade-card">'+
      '<div class="blade-header"><div><span class="blade-name">'+esc(b.name)+'</span> <span class="blade-weight">'+esc(b.weight)+'</span></div><span class="blade-type '+(typeClass[b.type]||typeClass.balance)+'">'+esc(typeLabel[b.type]||b.type)+'</span></div>'+
      '<div class="blade-tags">'+tags.join('')+'</div>'+
      '<div class="blade-detail">'+
      '<dl class="detail-grid"><dt>發射建議</dt><dd>'+esc(b.gameplan)+'</dd>'+(b.burst?'<dt>Burst風險</dt><dd>'+esc(b.burst)+'</dd>':'')+'<dt>簡評</dt><dd>'+esc(b.note)+'</dd></dl>'+
      '<div class="pros-cons"><div class="pros"><div class="pros-title">✓ 優勢</div><ul>'+(b.strengths||[]).map(s=>'<li>'+esc(s)+'</li>').join('')+'</ul></div><div class="cons"><div class="cons-title">✗ 劣勢</div><ul>'+(b.weaknesses||[]).map(w=>'<li>'+esc(w)+'</li>').join('')+'</ul></div></div>'+
      '<div class="combos-section"><div class="combos-title">⚙️ 推薦 Combo</div>'+
      Object.entries(b.combos||{}).map(([type,combo])=>{const p=comboParts(combo);return '<div class="combo-row"><span class="tag" style="background:var(--card2)">'+esc(typeLabel[type]||type)+'</span><span class="combo-part blade-part">'+esc(p[0])+'</span><span style="color:var(--muted)">+</span><span class="combo-part rach">'+esc(p[1])+'</span><span style="color:var(--muted)">+</span><span class="combo-part bit">'+esc(p[2])+'</span></div>';}).join('')+
      '</div></div></div>';
  }).join('');
}

function renderRatchets(filter=""){
  const tbody=document.getElementById("rachTable");
  const q=filter.toLowerCase();
  const filtered=RATCHETS.filter(r=>[r.id,r.note,r.type,r.height].join(" ").toLowerCase().includes(q));
  tbody.innerHTML=filtered.map(r=>'<tr><td><strong>'+esc(r.id)+'</strong></td><td>'+esc(r.sides)+'</td><td>'+esc(r.height)+'</td><td>'+esc(r.weight)+'</td><td><span class="blade-type '+(typeClass[zhTypeClass[r.type]]||typeClass.balance)+'">'+esc(r.type)+'</span></td><td>'+esc(r.note)+'</td></tr>').join('');
}

function renderBits(filter=""){
  const tbody=document.getElementById("bitTable");
  const q=filter.toLowerCase();
  const filtered=BITS.filter(b=>[b.name,b.abbr,b.note,b.type].join(" ").toLowerCase().includes(q));
  tbody.innerHTML=filtered.map(b=>'<tr><td><strong>'+esc(b.name)+'</strong></td><td>'+esc(b.abbr)+'</td><td>'+esc(b.weight||'?')+'</td><td>'+esc(b.burst)+'</td><td><span class="blade-type '+(typeClass[zhTypeClass[b.type]]||typeClass.balance)+'">'+esc(b.type)+'</span></td><td>'+esc(b.note)+'</td></tr>').join('');
}

function renderCombos(filter="",fAttack=false,fDefense=false,fStamina=false){
  const grid=document.getElementById("comboGrid");
  const q=filter.toLowerCase();
  const filtered=COMBOS.filter(c=>{
    const matchName=[c.name,...(c.parts||[]),c.note].join(" ").toLowerCase().includes(q);
    const matchType=(!fAttack&&!fDefense&&!fStamina)||(fAttack&&c.type==="attack")||(fDefense&&c.type==="defense")||(fStamina&&c.type==="stamina");
    return matchName&&matchType;
  });
  if(!filtered.length){grid.innerHTML='<div class="no-data">沒有符合條件的 Combo</div>';return;}
  grid.innerHTML=filtered.map(c=>'<div class="blade-card"><div class="blade-header"><div><span class="blade-name">'+esc(c.name)+'</span></div><span class="blade-type '+(typeClass[c.type]||typeClass.balance)+'">'+esc(typeLabel[c.type]||c.type)+'</span></div><div class="combo-row" style="margin-top:.5rem"><span class="combo-part blade-part">'+esc((c.parts||[])[0])+'</span><span style="color:var(--muted)">+</span><span class="combo-part rach">'+esc((c.parts||[])[1])+'</span><span style="color:var(--muted)">+</span><span class="combo-part bit">'+esc((c.parts||[])[2])+'</span></div><p style="font-size:.78rem;color:var(--muted);margin-top:.5rem">'+esc(c.note)+'</p></div>').join('');
}

function refreshBlades(){
  renderBlades(document.getElementById("searchBlade").value,document.getElementById("filterAttack").checked,document.getElementById("filterDefense").checked,document.getElementById("filterStamina").checked,document.getElementById("filterBalance").checked);
}

function refreshCombos(){
  renderCombos(document.getElementById("searchCombo").value,document.getElementById("filterComboAttack").checked,document.getElementById("filterComboDefense").checked,document.getElementById("filterComboStamina").checked);
}

function bindInteractions(){
  document.querySelectorAll(".tab-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
      document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
      document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById("panel-"+btn.dataset.tab).classList.add("active");
    });
  });
  document.getElementById("searchBlade").addEventListener("input",refreshBlades);
  ["filterAttack","filterDefense","filterStamina","filterBalance"].forEach(id=>document.getElementById(id).addEventListener("change",refreshBlades));
  document.getElementById("searchRach").addEventListener("input",e=>renderRatchets(e.target.value));
  document.getElementById("searchBit").addEventListener("input",e=>renderBits(e.target.value));
  document.getElementById("searchCombo").addEventListener("input",refreshCombos);
  ["filterComboAttack","filterComboDefense","filterComboStamina"].forEach(id=>document.getElementById(id).addEventListener("change",refreshCombos));
}

function closeOverlay(){document.getElementById("overlay").classList.remove("open");}

async function init(){
  try{
    await loadData();
    updateMeta();
    bindInteractions();
    renderBlades();
    renderRatchets();
    renderBits();
    renderCombos();
  }catch(e){
    console.error(e);
    document.getElementById("bladeGrid").innerHTML='<div class="no-data">無法載入零件資料</div>';
    document.getElementById("bladeStats").textContent='資料載入失敗';
  }
}

if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",init);
else init();
</script>

</body>
</html>
