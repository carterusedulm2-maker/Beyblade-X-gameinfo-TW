name: Update Events

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

concurrency:
  group: pages-deploy
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run scraper
        run: python3 scraper.py

      - name: Validate events.json
        run: python3 -c "import json; d=json.load(open('events.json')); assert len(d['events'])>0, 'No events!'; print(f'OK: {len(d[\"events\"])} events')"

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          ```yaml
          git add events.json
          git diff --cached --quiet || git commit -m "ci: update events $(date +%Y-%m-%d)"
          git push

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - id: deployment
        uses: actions/deploy-pages@v4

